## State Machine

```
┌─────────┐  user message   ┌────────────┐
│  idle   │────────────────>│ processing │
└─────────┘                 └─────┬──────┘
     ^                            │
     │                   ┌────────┼────────┐
     │                   │        │        │
     │              transaction clarify  error
     │                   │        │        │
     │                   v        v        │
     │            ┌──────────┐ ┌──────┐    │
     └────────────│confirming│ │asking│    │
       confirm/   └──────────┘ └──┬───┘    │
       cancel          │          │        │
                       │   user   │        │
                       │   answer │        │
                       │          v        │
                       │    ┌──────────┐   │
                       └───>│processing│<──┘
                            └──────────┘
```

---

## Example Interaction

**Current (no clarification):**
```
User: "Transferencia de 500"
Bot: [Shows transaction with missing fields, low confidence]
     [Confirm] [Cancel]
```

**New (with clarification):**
```
User: "Transferencia de 500"
Bot: "Entendido! Transferencia de $500. Necesito algunos datos:"
     "Desde que cuenta?"  [MP] [Banco] [Efectivo]
     "A que cuenta?"      [MP] [Banco] [Efectivo]

User: [Clicks "MP"] [Clicks "Banco"]
Bot: "Transferencia de $500 de Mercado Pago a Santander"
     [Confirmar] [Cancelar]
```

---

## Verification Plan

1. **Unit tests**: session-manager Redis operations, response-parser
2. **Integration tests**: Full conversation flow with mocked AI
3. **Manual testing**:
   - Send incomplete message, verify clarification buttons appear
   - Answer clarification, verify transaction updates
   - Ignore clarification + send new transaction, verify session resets
   - Server restart mid-conversation, verify session persists
4. **Load testing**: Multiple rapid messages to verify distributed locking


# Session-Based Conversation System for Budgetify Bot

## Overview

Transform the bot from a single-message transaction flow to a session-based conversation system where:
- AI can ask clarifying questions when uncertain
- Users can make clarifications after the initial message
- Conversation history is maintained within sessions (1h TTL)
- Sessions persist across restarts via Redis

---

## Architecture Changes

### Current Flow
```
User Message → AI → JSON → Confirm/Cancel → Done
```

### New Flow
```
User Message → Session Manager → AI → Response Type?
                                        ├─ Transaction → Confirm/Cancel → Done
                                        ├─ Clarification → Buttons/Text → Loop back
                                        └─ Error → Show message → Idle
```

---

## Key Design Decisions

| Decision | Choice |
|----------|--------|
| Clarification UI | Mixed: Buttons for known options (accounts, categories), text for open-ended (description, amount) |
| Session TTL | 1 hour |
| Persistence | Redis |
| Max conversation history | 20 messages per session |

---

## Data Models

### Session Object
```typescript
interface ConversationSession {
  sessionId: string;
  chatId: number;
  state: "idle" | "awaiting_clarification" | "awaiting_confirmation" | "processing";
  messages: ConversationMessage[];
  currentTransaction?: Partial<TransactionResult>;
  pendingQuestions?: ClarificationQuestion[];
  expiresAt: number;
}
```

### AI Response (Discriminated Union)
```typescript
type AIResponse =
  | { responseType: "transaction"; transaction: TransactionResult; questions?: ClarificationQuestion[] }
  | { responseType: "clarification"; partialTransaction?: Partial<TransactionResult>; questions: ClarificationQuestion[]; message: string }
  | { responseType: "error"; errorMessage: string; suggestions?: string[] }
```

### Clarification Question
```typescript
interface ClarificationQuestion {
  id: string;
  field: string;                    // e.g., "cuenta", "monto", "categoria"
  questionText: string;             // "Desde que cuenta pagaste?"
  questionType: "select" | "text";  // Button options vs. free text
  options?: string[];               // For "select" type
}
```

---

## Redis Key Structure

```
session:{chatId}           → JSON(ConversationSession)  TTL: 1h
session:lock:{chatId}      → "1" (distributed lock)     TTL: 30s
last_confirmed:{chatId}    → JSON(LastTransaction)      TTL: 24h
```

---

## Implementation Steps

### Phase 1: Infrastructure
1. Add Redis dependency (`ioredis`)
2. Create `src/services/session-manager.ts` with Redis operations
3. Add Redis URL to config validation
4. Add new types to `src/types/index.ts`

### Phase 2: AI Response Handling
1. Create `src/services/response-parser.ts` for parsing discriminated union
2. Modify `src/ai/prompts.ts`:
   - Add `buildConversationalPrompt()` with history context
   - Add new response schema instructions
   - Remove "SOLO JSON" restriction in favor of structured formats
3. Update `src/bot/handlers.ts` to handle response variants

### Phase 3: Conversation Flow
1. Create `src/services/conversation-handler.ts` with state machine
2. Modify `src/server.ts` to route through conversation handler
3. Update `src/bot/callbacks.ts` for clarification button handling
4. Create `src/bot/clarification-builder.ts` for question UI

### Phase 4: Migration & Cleanup
1. Migrate pending-operations to Redis
2. Deprecate in-memory context-manager
3. Add monitoring/logging


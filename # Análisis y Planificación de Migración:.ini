#### 4.2 Fases de migración
- **Fase 1**: Setup inicial (TypeScript, estructura, dependencias)
- **Fase 2**: Migrar servicios base (Telegram, Gemini, Sheets clients)
- **Fase 3**: Migrar handlers de mensajes (texto, imagen, audio)
- **Fase 4**: Migrar callbacks y confirmaciones
- **Fase 5**: Migrar validaciones y escritura en Sheets
- **Fase 6**: Testing y optimizaciones
- **Fase 7**: Deploy y configuración


# Análisis y Planificación de Migración: Bot de Telegram Budgetify

## CONTEXTO DEL PROYECTO

Estás analizando un bot de Telegram desarrollado en Google Apps Script que procesa transacciones financieras usando IA. El bot permite a los usuarios registrar gastos, ingresos y transferencias mediante:
- Mensajes de texto
- Imágenes de comprobantes (análisis con Gemini Vision)
- Mensajes de audio (transcripción con Gemini Audio)

Los datos se almacenan en Google Sheets con estructura específica (hojas: GASTOS, INGRESOS, TRANSFERENCIAS, CONFIG, MIS_DATOS).

## OBJETIVO DE LA MIGRACIÓN

Migrar el código de Google Apps Script a **Node.js + TypeScript** para mejorar:
- Desarrollo local con hot reload
- Testing unitario e integración
- Debugging con breakpoints
- Type safety con TypeScript
- Estructura modular y mantenible
- CI/CD con GitHub Actions
- Deploy en Fly.io (tier gratuito, sin sleep)

## CÓDIGO ACTUAL A ANALIZAR

El archivo `bot-inteligente-v4.gs` contiene ~1292 líneas de código JavaScript que incluye:

### Funcionalidades principales:
1. **doPost()** - Punto de entrada para webhooks de Telegram
2. **Manejo de mensajes**:
   - Texto: procesamiento con Gemini para extraer datos financieros
   - Imágenes: análisis con Gemini Vision de comprobantes
   - Audio: transcripción con Gemini Audio y luego procesamiento como texto
3. **Comandos**:
   - `/nuevo` o `/reset`: limpia contexto de conversación
   - `/contexto`: muestra último registro confirmado
4. **Callbacks**: manejo de botones Confirmar/Cancelar
5. **Persistencia**:
   - Contexto de conversación en PropertiesService
   - Escritura en Google Sheets (GASTOS, INGRESOS, TRANSFERENCIAS)
6. **Validaciones**: extensas validaciones de datos antes de escribir en Sheets

### APIs y servicios externos:
- **Telegram Bot API**: webhooks, envío/edición de mensajes, descarga de archivos
- **Google Gemini API**: 
  - Texto: `generateContent` con prompts estructurados
  - Vision: análisis de imágenes de comprobantes
  - Audio: transcripción de notas de voz
- **Google Sheets API**: lectura de CONFIG y MIS_DATOS, escritura en GASTOS/INGRESOS/TRANSFERENCIAS

### Dependencias de Apps Script:
- `SpreadsheetApp` - acceso a Google Sheets
- `PropertiesService` - almacenamiento de contexto temporal
- `UrlFetchApp` - llamadas HTTP a APIs externas
- `Utilities` - funciones utilitarias (base64, UUID)
- `Logger` - logging (reemplazar por logger moderno)


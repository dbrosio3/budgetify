## CONSIDERACIONES ESPECIALES

1. **Compatibilidad**: El comportamiento debe ser idéntico al código original
2. **Performance**: Optimizar llamadas paralelas donde sea posible
3. **Seguridad**: No hardcodear tokens/keys, usar variables de entorno
4. **Mantenibilidad**: Código modular, testeable, bien documentado
5. **Deploy**: Configurar para Fly.io (Dockerfile, fly.toml)


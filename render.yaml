services:
  - type: web
    name: budgetify-bot
    runtime: node
    buildCommand: bun install
    startCommand: bun run src/server.ts
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: TELEGRAM_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL_NAME
        value: gemini-2.5-flash
      - key: GOOGLE_SHEETS_SPREADSHEET_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: WEBHOOK_URL
        sync: false
      - key: DEFAULT_AI_PROVIDER
        value: gemini
      - key: ANTHROPIC_API_KEY
        sync: false
        optional: true
      - key: ANTHROPIC_MODEL_NAME
        value: claude-haiku-4-5-20251001
        optional: true

